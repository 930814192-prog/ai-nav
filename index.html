<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>喵办 AI 导航 — 打工人必备 AI 工具站</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: #f5f6f7;
      color: #333;
      font-size: 14px;
    }

    a { text-decoration: none; color: inherit; }

    /* ══════════════════════════════
       顶部导航
    ══════════════════════════════ */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .topbar-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .logo-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-right: 32px;
      line-height: 1.2;
    }
    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: #e53935;
    }
    .logo-sub {
      font-size: 11px;
      color: #999;
    }
    .topnav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
    }
    .topnav-links a {
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      color: #555;
      white-space: nowrap;
      transition: all .15s;
    }
    .topnav-links a:hover { background: #f5f5f5; color: #333; }
    .topnav-links a.active { color: #e53935; font-weight: 600; }
    .topnav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-search {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #666;
      padding: 4px 8px;
    }
    .btn-login {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-login:hover { background: #111; }

    /* ══════════════════════════════
       Hero 区域（搜索 + 快讯）
    ══════════════════════════════ */
    .hero {
      background: linear-gradient(135deg, #eef0ff 0%, #f5f0ff 50%, #e8f4ff 100%);
      border-bottom: 1px solid #e0e4ff;
    }
    .hero-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 160px 1fr 280px;
      gap: 24px;
      align-items: center;
    }
    .hero-logo {
      text-align: center;
    }
    .hero-logo-icon {
      font-size: 48px;
      line-height: 1;
    }
    .hero-logo-text {
      font-size: 16px;
      font-weight: 800;
      color: #e53935;
      margin-top: 4px;
    }
    .hero-logo-sub {
      font-size: 11px;
      color: #999;
    }
    .hero-search-area {}
    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .quick-tag {
      padding: 3px 10px;
      border-radius: 3px;
      background: #f5f5f5;
      color: #555;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid #eee;
    }
    .quick-tag:hover { background: #e53935; color: #fff; border-color: #e53935; }
    .search-box {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 999px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 6px 6px 6px 24px;
      max-width: 600px;
    }
    .search-box input {
      flex: 1;
      padding: 10px 0;
      border: none;
      outline: none;
      font-size: 16px;
      color: #333;
      background: transparent;
    }
    .search-box input::placeholder { color: #bbb; }
    .search-box button {
      background: #5b6af7;
      color: #fff;
      border: none;
      padding: 10px 28px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      border-radius: 999px;
      transition: background .15s;
      white-space: nowrap;
    }
    .search-box button:hover { background: #4455e6; }

    /* 快讯 */
    .hero-news {
      border: 1px solid #eee;
      border-radius: 6px;
      overflow: hidden;
    }
    .news-header {
      background: #f9f9f9;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
    }
    .news-header-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }
    .news-more {
      font-size: 12px;
      color: #999;
    }
    .news-more:hover { color: #e53935; }
    .news-list { padding: 4px 0; }
    .news-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      gap: 8px;
      transition: background .15s;
      cursor: pointer;
    }
    .news-item:hover { background: #fafafa; }
    .news-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e53935;
      flex-shrink: 0;
    }
    .news-text {
      flex: 1;
      font-size: 12px;
      color: #555;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .news-time {
      font-size: 11px;
      color: #bbb;
      white-space: nowrap;
    }

    /* ══════════════════════════════
       主体布局
    ══════════════════════════════ */
    .body-wrap {
      max-width: 1300px;
      margin: 16px auto;
      padding: 0 24px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    /* ══════════════════════════════
       左侧分类导航
    ══════════════════════════════ */
    .sidebar {
      width: 140px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #eee;
      overflow: hidden;
      position: sticky;
      top: 68px;
    }
    .sidebar-logo {
      display: block;
      width: 100%;
      padding: 14px 12px 10px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }
    .sidebar-logo img {
      width: 100%;
      max-width: 110px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .sidebar-item {
      display: block;
      width: 100%;
      padding: 10px 16px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      border: none;
      background: none;
      text-align: left;
      border-left: 3px solid transparent;
      transition: all .15s;
      border-bottom: 1px solid #f5f5f5;
    }
    .sidebar-item:last-child { border-bottom: none; }
    .sidebar-item:hover { background: #fafafa; color: #333; }
    .sidebar-item.active {
      border-left-color: #e53935;
      color: #e53935;
      font-weight: 600;
      background: #fff8f8;
    }

    /* ══════════════════════════════
       右侧内容区
    ══════════════════════════════ */
    .main { flex: 1; min-width: 0; }

    /* 公告栏 */
    .notice-bar {
      background: #fff8f8;
      border: 1px solid #fdd;
      border-radius: 6px;
      padding: 9px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #c62828;
    }
    .notice-bar span { flex: 1; }

    /* 分类标题 */
    .cat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cat-title {
      font-size: 16px;
      font-weight: 700;
      color: #222;
    }
    .cat-count {
      font-size: 12px;
      color: #999;
    }

    /* 工具网格 */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    /* 工具卡片 */
    .tool-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .tool-card:hover {
      border-color: #e53935;
      box-shadow: 0 2px 12px rgba(229,57,53,.08);
      transform: translateY(-1px);
    }
    .tool-card.featured {
      background: #f0f7ff;
      border-color: #90caf9;
    }
    .tool-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .tool-icon img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
    }
    .tool-name {
      font-size: 13px;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    .tool-desc {
      font-size: 11px;
      color: #999;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      width: 100%;
    }

    /* 右侧悬浮栏 */
    .float-bar {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 100;
    }
    .float-btn {
      width: 44px;
      height: 44px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all .15s;
      color: #666;
    }
    .float-btn span {
      font-size: 10px;
      color: #999;
      margin-top: 1px;
    }
    .float-btn:hover { border-color: #e53935; color: #e53935; }

    .float-btn { position: relative; }
    .float-btn .qr-popup {
      display: none;
      position: absolute;
      right: 54px;
      top: 50%;
      transform: translateY(-50%);
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      white-space: nowrap;
      z-index: 300;
    }
    .float-btn .qr-popup img { width: 160px; height: auto; display: block; border-radius: 4px; }
    .float-btn .qr-popup p { font-size: 11px; color: #999; text-align: center; margin-top: 6px; }
    .float-btn:hover .qr-popup { display: block; }

    /* ══════════════════════════════
       Footer
    ══════════════════════════════ */
    footer {
      text-align: center;
      padding: 24px;
      color: #bbb;
      font-size: 12px;
      border-top: 1px solid #eee;
      background: #fff;
      margin-top: 24px;
    }

    /* 响应式 */
    @media (max-width: 1100px) {
      .tool-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
      .hero-inner { grid-template-columns: 1fr; }
      .hero-logo { display: none; }
      .hero-news { display: none; }
      .sidebar { display: none; }
      .tool-grid { grid-template-columns: repeat(3, 1fr); }
      .float-bar { display: none; }
    }

    /* 登录弹窗 */
    .modal-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-mask.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 32px 28px;
      width: 360px;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .modal-close {
      position: absolute;
      top: 14px; right: 16px;
      font-size: 20px;
      color: #bbb;
      cursor: pointer;
      border: none;
      background: none;
      line-height: 1;
    }
    .modal-close:hover { color: #666; }
    .modal-title { font-size: 18px; font-weight: 800; color: #222; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: #999; margin-bottom: 24px; }
    .modal-label { font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
    .modal-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 14px;
    }
    .modal-input:focus { border-color: #e53935; }
    .modal-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .modal-row .modal-input { margin-bottom: 0; flex: 1; }
    .btn-send-code {
      padding: 10px 14px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .btn-send-code:hover:not(:disabled) { background: #e53935; color: #fff; border-color: #e53935; }
    .btn-send-code:disabled { color: #bbb; cursor: not-allowed; }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-submit:hover { background: #c62828; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    .modal-msg { font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
    .modal-msg.error { color: #e53935; }
    .modal-msg.success { color: #43a047; }

    /* 登录后用户头像 */
    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #e53935;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .user-menu {
      display: none;
      position: absolute;
      top: 38px; right: 0;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      min-width: 120px;
      z-index: 300;
    }
    .user-avatar:hover .user-menu { display: block; }
    .user-menu-item {
      padding: 10px 16px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: background .15s;
    }
    .user-menu-item:hover { background: #fafafa; color: #e53935; }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo-area">
      <div class="logo-name">喵办</div>
      <div class="logo-sub">AI 工具导航</div>
    </div>
    <div class="topnav-links">
      <a href="#" class="active">首页</a>

      <a href="scenes.html">场景推荐</a>

      </div>

</div>

<!-- Hero 区域 -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-logo">
      <div class="hero-logo-icon">🐱</div>
      <div class="hero-logo-text">喵办</div>
      <div class="hero-logo-sub">AI 工具导航</div>
    </div>
    <div class="hero-search-area">
      <div class="quick-tags">
        <span class="quick-tag" onclick="searchScene('ChatGPT')">ChatGPT</span>
        <span class="quick-tag" onclick="searchScene('DeepSeek')">DeepSeek</span>
        <span class="quick-tag" onclick="searchScene('Kimi')">Kimi</span>
        <span class="quick-tag" onclick="searchScene('豆包')">豆包</span>
        <span class="quick-tag" onclick="searchScene('Midjourney')">Midjourney</span>
        <span class="quick-tag" onclick="searchScene('写周报')">写周报</span>
        <span class="quick-tag" onclick="searchScene('做PPT')">做 PPT</span>
        <span class="quick-tag" onclick="searchScene('写代码')">写代码</span>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索 AI 工具或使用场景…" oninput="filterCards()" />
        <button onclick="filterCards()">搜索</button>
      </div>
    </div>
    <div class="hero-news">
      <div class="news-header">
        <span class="news-header-title">📡 AI 快讯</span>
        <a href="#" class="news-more">更多 &gt;</a>
      </div>
      <div class="news-list" id="newsList"></div>
    </div>
  </div>
</div>

<!-- 主体 -->
<div class="body-wrap">

  <!-- 左侧分类 -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="mulu-logo.png" alt="喵办 AI 导航" />
    </div>
    <button class="sidebar-item active" onclick="filterCat('all', this)">全部工具</button>
    <div id="catButtons"></div>
  </aside>

  <!-- 右侧内容 -->
  <main class="main">

    <div class="notice-bar">
      📢 <span>喵办 AI 导航持续更新中，收录最好用的 AI 工具 + 中文使用教程，帮打工人快速上手 &gt;&gt;</span>
    </div>

    <div class="cat-header">
      <div class="cat-title" id="catTitle">全部工具</div>
      <div class="cat-count" id="catCount">共 16 个工具</div>
    </div>

    <div class="tool-grid" id="toolGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:#bbb;">加载中…</div>
    </div>
  </main>
</div>

<!-- 右侧悬浮栏 -->
<div class="float-bar">
  <div class="float-btn">💬<span>反馈</span>
    <div class="qr-popup">
      <img src="weixin.jpg" alt="微信二维码" />
      <p>微信扫码联系我们</p>
    </div>
  </div>
  <div class="float-btn">⭐<span>收藏</span></div>
  <div class="float-btn">🔝<span>顶部</span></div>
</div>

<footer>
  © 2025 喵办 AI 导航 &nbsp;·&nbsp; 帮打工人用好 AI &nbsp;·&nbsp; 持续更新中
</footer>

<script>
  const API_BASE = 'https://web-production-e9e6b.up.railway.app';

  let allTools = [];
  let currentCatId = 'all';

  function relativeTime(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const h = Math.floor(diff / 3600000);
    if (h < 1) return '刚刚';
    if (h < 24) return h + '小时前';
    const d = Math.floor(h / 24);
    if (d === 1) return '昨天';
    return d + '天前';
  }

  function renderToolCard(tool) {
    const featuredClass = tool.is_featured ? ' featured' : '';
    const icon = tool.logo || '🤖';
    return `<a class="tool-card${featuredClass}" href="${tool.url}" target="_blank" rel="noopener noreferrer"
        data-cat-id="${tool.category_id}" data-name="${tool.name} ${tool.description || ''}">
      <div class="tool-icon">${icon}</div>
      <div class="tool-name">${tool.name}</div>
      <div class="tool-desc">${tool.description || ''}</div>
    </a>`;
  }

  function renderTools(tools) {
    const grid = document.getElementById('toolGrid');
    if (!tools.length) {
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:40px;color:#bbb;">没有找到相关工具</p>';
    } else {
      grid.innerHTML = tools.map(renderToolCard).join('');
    }
    document.getElementById('catCount').textContent = '共 ' + tools.length + ' 个工具';
  }

  function filterCards() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    let filtered = allTools;
    if (currentCatId !== 'all') {
      filtered = filtered.filter(t => String(t.category_id) === String(currentCatId));
    }
    if (q) {
      filtered = filtered.filter(t =>
        (t.name + ' ' + (t.description || '')).toLowerCase().includes(q)
      );
    }
    renderTools(filtered);
  }

  function filterCat(catId, btn) {
    currentCatId = catId;
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('catTitle').textContent = btn.textContent.trim();
    document.getElementById('searchInput').value = '';
    filterCards();
  }

  function searchScene(keyword) {
    currentCatId = 'all';
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.querySelector('.sidebar-item').classList.add('active');
    document.getElementById('catTitle').textContent = '全部工具';
    document.getElementById('searchInput').value = keyword;
    filterCards();
  }

  async function init() {
    try {
      const [catRes, toolRes, newsRes] = await Promise.all([
        fetch(API_BASE + '/categories').then(r => r.json()),
        fetch(API_BASE + '/tools').then(r => r.json()),
        fetch(API_BASE + '/news').then(r => r.json()),
      ]);

      // 渲染侧边栏分类（跳过第一个"全部工具"，已硬编码）
      const catButtons = document.getElementById('catButtons');
      catButtons.innerHTML = catRes.data
        .filter(cat => cat.name !== '全部工具')
        .map(cat => `<button class="sidebar-item" onclick="filterCat('${cat.id}', this)">${cat.name}</button>`)
        .join('');

      // 渲染工具
      allTools = toolRes.data;
      renderTools(allTools);

      // 渲染新闻
      document.getElementById('newsList').innerHTML = newsRes.data
        .map(item => `<div class="news-item" onclick="window.open('${item.url || '#'}','_blank')">
          <div class="news-dot"></div>
          <div class="news-text">${item.title}</div>
          <div class="news-time">${relativeTime(item.published_at)}</div>
        </div>`)
        .join('');

    } catch (err) {
      console.error('API 加载失败:', err);
      document.getElementById('toolGrid').innerHTML =
        '<p style="grid-column:1/-1;text-align:center;padding:40px;color:#c00;">数据加载失败，请刷新重试</p>';
    }
  }

  init();

  document.querySelector('.float-bar').lastElementChild.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>

<div class="modal-mask" id="modalMask" onclick="handleMaskClick(event)">

    <div class="modal-title">登录喵办</div>

        <input class="modal-input" type="text" id="codeInput" placeholder="输入6位验证码" maxlength="6" />

      <div style="margin-top:10px;text-align:center">

</div>

<script>
  const SUPABASE_URL = 'https://xrjhloeblofbzgpiwvcp.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhyamhsb2VibG9mYnpncGl3dmNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTIxNjIsImV4cCI6MjA5NDY4ODE2Mn0.qe3Q9F6bwswAe-hxNbCGHT5mkkZdBJqTKK6_Syj3-uQ';

  function supaFetch(path, body) {
    return fetch(SUPABASE_URL + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify(body)
    }).then(r => r.json());
  }

  function openLogin() { document.getElementById('modalMask').classList.add('open'); }
  function closeLogin() {
    document.getElementById('modalMask').classList.remove('open');
    document.getElementById('stepEmail').style.display = '';
    document.getElementById('stepCode').style.display = 'none';
    document.getElementById('emailInput').value = '';
    document.getElementById('codeInput').value = '';
    document.getElementById('emailMsg').textContent = '';
    document.getElementById('codeMsg').textContent = '';
  }
  function handleMaskClick(e) { if (e.target === document.getElementById('modalMask')) closeLogin(); }

  function setMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'modal-msg ' + (type || '');
  }

  async function sendCode(isResend) {
    const email = document.getElementById('emailInput').value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setMsg('emailMsg', '请输入有效的邮箱地址', 'error'); return;
    }
    const btn = isResend ? document.getElementById('resendBtn') : document.querySelector('#stepEmail .btn-submit');
    btn.disabled = true;
    btn.textContent = '发送中…';
    setMsg(isResend ? 'codeMsg' : 'emailMsg', '', '');

    const res = await supaFetch('/auth/v1/otp', { email, create_user: true });
    btn.disabled = false;
    btn.textContent = isResend ? '重新发送' : '发送验证码';

    if (res.error) {
      setMsg(isResend ? 'codeMsg' : 'emailMsg', '发送失败：' + res.error.message, 'error'); return;
    }
    document.getElementById('emailDisplay').textContent = email;
    document.getElementById('stepEmail').style.display = 'none';
    document.getElementById('stepCode').style.display = '';
    if (isResend) setMsg('codeMsg', '验证码已重新发送', 'success');
  }

  async function verifyCode() {
    const email = document.getElementById('emailInput').value.trim();
    const token = document.getElementById('codeInput').value.trim();
    if (!token || token.length < 6) { setMsg('codeMsg', '请输入6位验证码', 'error'); return; }

    const btn = document.querySelector('#stepCode .btn-submit');
    btn.disabled = true; btn.textContent = '验证中…';

    const res = await supaFetch('/auth/v1/verify', { email, token, type: 'email' });
    btn.disabled = false; btn.textContent = '确认登录';

    if (res.error) { setMsg('codeMsg', '验证码错误或已过期', 'error'); return; }

    localStorage.setItem('sb_user_email', res.user?.email || email);
    closeLogin();
    updateLoginState(res.user?.email || email);
  }

  function updateLoginState(email) {
    if (!email) return;
    document.querySelector('.btn-login').style.display = 'none';
    const avatar = document.getElementById('userAvatar');
    avatar.style.display = 'flex';
    document.getElementById('userInitial').textContent = email[0].toUpperCase();
    document.getElementById('userEmail').textContent = email;
  }

  function logout() {
    localStorage.removeItem('sb_user_email');
    document.querySelector('.btn-login').style.display = '';
    document.getElementById('userAvatar').style.display = 'none';
  }

  // 页面加载时恢复登录状态
  const savedEmail = localStorage.getItem('sb_user_email');
  if (savedEmail) updateLoginState(savedEmail);
</script>
