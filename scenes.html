    .hero-sub { font-size: 14px; color: #777; }

    .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab-btn { padding: 8px 20px; border-radius: 999px; border: 1px solid #eee; background: #fff; font-size: 13px; color: #555; cursor: pointer; transition: all .15s; }
    .tab-btn:hover { border-color: #e53935; color: #e53935; }
    .tab-btn.active { background: #e53935; color: #fff; border-color: #e53935; font-weight: 600; }

    .scene-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

    .scene-item { background: #fff; border: 1px solid #eee; border-radius: 10px; overflow: hidden; transition: border-color .15s; }
    .scene-item.open { border-color: #e53935; }

    .scene-card { display: flex; align-items: center; gap: 14px; padding: 18px 20px; cursor: pointer; }
    .scene-card:hover { background: #fafafa; }
    .scene-emoji { font-size: 32px; flex-shrink: 0; }
    .scene-info { flex: 1; min-width: 0; }
    .scene-name { font-size: 15px; font-weight: 700; color: #222; margin-bottom: 3px; }
    .scene-desc { font-size: 12px; color: #999; }
    .scene-count { font-size: 11px; color: #bbb; margin-top: 4px; }
    .scene-arrow { font-size: 13px; color: #ccc; flex-shrink: 0; transition: transform .2s; }
    .scene-item.open .scene-arrow { transform: rotate(180deg); color: #e53935; }

    .scene-detail { display: none; border-top: 2px solid #e53935; background: #fafafa; padding: 18px 20px; }
    .scene-item.open .scene-detail { display: block; }

    .tool-rank { width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

    .rank-2 { background: #c0c0c0; color: #555; }
    .rank-3 { background: #cd7f32; color: #fff; }
    .rank-4 { background: #f0f0f0; color: #888; }
    .tool-rec-body { flex: 1; }
    .tool-rec-name { font-size: 13px; font-weight: 600; color: #222; }
    .tool-rec-reason { font-size: 12px; color: #888; margin-top: 1px; }

    .prompt-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px 14px; }
    .prompt-label { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 6px; }
    .prompt-text { font-size: 12px; color: #444; line-height: 1.7; }
    .copy-btn { margin-top: 10px; padding: 5px 14px; background: #e53935; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; transition: background .15s; }
    .copy-btn:hover { background: #c62828; }

function toggle(id) {
  const item = document.getElementById('scene-' + id);
  item.classList.toggle('open');
}

  navigator.clipboard.writeText(scene.prompt).then(() => {
    const btn = document.getElementById('copy-' + id);
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制提示词'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderScene(s) {
  const toolsHtml = s.tools.map((t, i) => `
    <div class="tool-rec">
      <div class="tool-rank rank-${i+1}">${i+1}</div>
      <div class="tool-rec-body">
        <div class="tool-rec-name">${t.name}</div>
        <div class="tool-rec-reason">${t.reason}</div>
      </div>
    </div>`).join('');

  return `<div class="scene-item" id="scene-${s.id}" data-tab="${s.tab}">
    <div class="scene-card" onclick="toggle(${s.id})">
      <div class="scene-emoji">${s.emoji}</div>
      <div class="scene-info">
        <div class="scene-name">${s.name}</div>
        <div class="scene-desc">${s.desc}</div>
        <div class="scene-count">推荐 ${s.tools.length} 个工具</div>
      </div>
      <div class="scene-arrow">▼</div>
    </div>
    <div class="scene-detail">
      <div class="detail-tools">
        <div class="detail-tools-title">推荐工具</div>
        ${toolsHtml}
      </div>
      <div class="prompt-box">
        <div class="prompt-label">💬 可直接使用的提示词模板</div>
        <div class="prompt-text">${s.prompt.replace(/\n/g, '<br>')}</div>
        <button class="copy-btn" id="copy-${s.id}" onclick="copyPrompt(${s.id})">复制提示词</button>
      </div>
    </div>
  </div>`;
}

function render(tab) {
  const list = tab === 'all' ? scenes : scenes.filter(s => s.tab === tab);
  const grid = document.getElementById('sceneGrid');
  grid.innerHTML = list.length ? list.map(renderScene).join('') : '<div class="empty">暂无场景</div>';
}

function filterTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(tab);
}

render('all');
</script>
</body>
</html>
