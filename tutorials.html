let currentCat = 'all';
const levelMap = { beginner:{label:'入门',cls:'tag-beginner'}, intermediate:{label:'进阶',cls:'tag-intermediate'}, advanced:{label:'高级',cls:'tag-advanced'} };

function toggle(id) {
  const item = document.getElementById('tut-' + id);
  item.classList.toggle('open');
}

function renderCard(t) {
  const lv = levelMap[t.level];
  const stepsHtml = t.steps.map((s,i) =>
    `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`
  ).join('');
  return `<div class="tut-item" id="tut-${t.id}" data-cat="${t.cat}" data-search="${t.tool} ${t.title} ${t.desc}">
    <div class="tut-card" onclick="toggle(${t.id})">
      <div class="tut-icon">${t.icon}</div>
      <div class="tut-body">
        <div class="tut-title">${t.title}</div>
        <div class="tut-desc">${t.desc}</div>
        <div class="tut-meta">
          <span class="tut-tag ${lv.cls}">${lv.label}</span>
          <span class="tut-time">⏱ ${t.time}</span>
          <span class="tut-tool">${t.tool}</span>
        </div>
      </div>
      <div class="tut-arrow">▼</div>
    </div>
    <div class="tut-content">
      <p class="intro">${t.intro}</p>
      <ul class="tut-steps">${stepsHtml}</ul>
      <div class="tut-tips"><strong>💡 小贴士：</strong>${t.tips}</div>
    </div>
  </div>`;
}

function render(list) {
  const el = document.getElementById('tutorialList');
  el.innerHTML = list.length ? list.map(renderCard).join('') : '<div class="empty">没有找到相关教程</div>';
  document.getElementById('sectionCount').textContent = '共 ' + list.length + ' 篇教程';
}

function filterTutorials() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = currentCat === 'all' ? tutorials : tutorials.filter(t => t.cat === currentCat);
  if (q) list = list.filter(t => (t.tool + t.title + t.desc).toLowerCase().includes(q));
  render(list);
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sectionTitle').textContent = btn.textContent.trim();
  document.getElementById('searchInput').value = '';
  filterTutorials();
}
